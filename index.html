<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODAB Blues</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: black;
    overflow: hidden;
}

/* FUNDO COM IMG (SEM CORTE) */
.bg-container {
    position: fixed;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.bg-container img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* MOSTRA TUDO */
    animation: zoom 20s infinite alternate;
}

/* ZOOM SUAVE */
@keyframes zoom {
    from { transform: scale(2); }
    to { transform: scale(1.05); }
}

/* OVERLAY ESCURO */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

/* CONTEÚDO */
.container {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    padding: 20px;
}

/* TÍTULO RESPONSIVO */
h1 {
    color: rgb(245, 11, 11);
    font-size: clamp(2rem, 6vw, 4rem);
    letter-spacing: 3px;
    text-shadow: 2px 2px 10px black;
    animation: pulse 1s infinite;
    transition: 0.3s;
    border-radius: 50%;

    
}

/* SUBTÍTULO */
p {
    color: #eb0b0b;
    margin-top: 10px;
    font-size: clamp(1rem, 3vw, 1.5rem);
}

/* BOTÃO CAVEIRA */
.skull-btn {
    margin-top: 20%;
    width: clamp(90px, 20vw, 130px);
    height: clamp(90px, 20vw, 130px);
    border-radius: 50%;
    background: black;
    border: 3px solid white;
    cursor: pointer;
    position: relative;
    animation: pulse 1s infinite;
    transition: 0.3s;
}

.skull-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px white;
    
}

/* ÍCONE */
.skull-btn::before {
    content: "☠";
    font-size: clamp(40px, 8vw, 65px);
    color: white;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

@keyframes pulse {
    0% { box-shadow: 0 0 10px rgb(223, 16, 16); }
    50% { box-shadow: 0 0 30px rgb(228, 18, 18); }
    100% { box-shadow: 0 0 10px rgb(231, 17, 17); }
}

/* AJUSTES MOBILE */
@media (max-width: 600px) {
    .container {
        justify-content: flex-end;
        padding-bottom: 60px;
    }
}

.skul-container {
   
    position: absolute;
    /* Mude de left/right para bottom para descer */
    top: auto;
    bottom: 0; /* Isso cola a faixa no fundo da imagem */
    left: 0;
    width: 100%;
    /* Se ela estava oculta à direita, remova o right negativo */
    right: 0; 
    }

.osso-container {
   
    position:absolute;
    /* Mude de left/right para bottom para descer */
    top: auto;
    bottom: 400px; /* Isso cola a faixa no fundo da imagem */
    left: 80%;
    width: 100%;
    /* Se ela estava oculta à direita, remova o right negativo */
    right: 0%;
    }




</style>
</head>

<body>
     /* Icone da aba*/
     <link rel="icon" type="image/jpeg" href="cav.jpeg">

     /* caveira na faixa preta da página*/

     <div class="skul-container">
         <img src="cav.jpeg" alt="" width="20%">
     </div>

     <div class="osso-container">
         <img src="cav.jpeg" alt="" width="20%" position="right">
     </div>
     
     
    <div class="bg-container">
       <img src="tony.jpeg" alt="ODAB Blues">
    </div>


<div class="overlay"></div>

<div class="container">
    <h1>ODAB BLUES</h1>
    <p>Hard Rock & Punk Rock</p>

    <div class="skull-btn" onclick="entrar()"></div>
</div>

<script>
function entrar() {
    window.location.href = "home.html";
}
</script>




</body>
</html>
